<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAPPY BLUES 🚀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#0f1419;overflow:hidden;touch-action:manipulation}
canvas{display:block;margin:0 auto;background:linear-gradient(180deg,#171e27 0%,#0ea5e9 100%)}
.info{position:absolute;top:10px;left:50%;transform:translateX(-50%);color:#fff;font-size:18px;text-shadow:0 0 8px #0ea5e9;z-index:10}
.over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:20}
.over h1{font-size:48px;color:#ff4d6d;text-shadow:0 0 15px #ff4d6d}
.over p{font-size:24px;color:#7dd3fc;margin:15px 0}
.over button{padding:12px 25px;font-size:18px;background:#0ea5e9;color:#0c1015;border:none;cursor:pointer;font-weight:bold;box-shadow:0 0 15px #0ea5e9}
</style>
</head>
<body>
<div class="info">SCORE: <span id="score">0</span></div>
<div class="over" id="gameOver">
<h1>GAME OVER</h1>
<p>YOUR SCORE: <span id="fscore">0</span></p>
<button onclick="location.reload()">TRY AGAIN</button>
</div>
<canvas id="game"></canvas>
<script>
const c = document.getElementById('game');
const ctx = c.getContext('2d');
c.width = 400;
c.height = 600;

let bird = {x:50,y:250,w:30,h:20,vy:0,g:0.4,j:-7};
let pipes = [];
let score = 0;
let gameOver = false;

function addPipe(){
  let h = Math.random()*200 + 100;
  pipes.push({x:c.width,y:h,w:60,space:150});
}
setInterval(addPipe, 2000);

function jump(){
  if(!gameOver) bird.vy = bird.j;
}
document.addEventListener('touchstart', jump);
document.addEventListener('keydown', jump);

function drawBird(){
  ctx.fillStyle = '#38bdf8';
  ctx.shadowColor = '#0ea5e9';
  ctx.shadowBlur = 10;
  ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
  ctx.shadowBlur = 0;
}

function drawPipes(){
  pipes.forEach((p,i)=>{
    ctx.fillStyle = '#0ea5e9';
    ctx.fillRect(p.x, 0, p.w, p.y);
    ctx.fillRect(p.x, p.y + p.space, p.w, c.height - p.y - p.space);
    p.x -= 2;
    if(p.x + p.w < 0) {pipes.splice(i,1); score++; document.getElementById('score').textContent = score;}
    if(
      bird.x < p.x + p.w &&
      bird.x + bird.w > p.x &&
      (bird.y < p.y || bird.y + bird.h > p.y + p.space)
    ){
      gameOver = true;
      document.getElementById('fscore').textContent = score;
      document.getElementById('gameOver').style.display = 'block';
    }
  })
}

function loop(){
  ctx.clearRect(0,0,c.width,c.height);
  bird.vy += bird.g;
  bird.y += bird.vy;
  if(bird.y + bird.h > c.height || bird.y < 0) {
    gameOver = true;
    document.getElementById('fscore').textContent = score;
    document.getElementById('gameOver').style.display = 'block';
  }
  drawBird();
  drawPipes();
  if(!gameOver) requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
